# docker-compose.dev.yml — spins only infra (Postgres + Redis + AI service)
# Next.js and worker run locally via: npm run dev:all && npm run worker
# Usage: docker compose -f docker-compose.dev.yml up -d

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ats_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-atsuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-atspassword}
      POSTGRES_DB: ${POSTGRES_DB:-atsdb}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-atsuser} -d ${POSTGRES_DB:-atsdb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ats_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: ats_ai_service
    restart: unless-stopped
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      LOG_LEVEL: info
      EMBEDDING_MODEL_NAME: ${AI_EMBEDDING_MODEL:-all-MiniLM-L6-v2}
      RESUME_FILES_BASE_PATH: /app/uploads/resumes
      RESUME_NLP_ENABLED: ${AI_RESUME_PARSE_ENABLED:-true}
      SPACY_MODEL_NAME: en_core_web_sm
    ports:
      - "${AI_SERVICE_PORT:-8000}:8000"
    volumes:
      - ./uploads:/app/uploads:ro
      # hot-reload in dev
      - ./ai-service:/app:cached
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  postgres_data:
  redis_data:
